<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#EA580C"/>
  <g stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Fork (left, tilted ~-20deg) -->
    <!-- Prongs -->
    <line x1="8"  y1="5"  x2="7.2" y2="10"/>
    <line x1="10" y1="4.5" x2="9.2" y2="10"/>
    <line x1="12" y1="5"  x2="11.2" y2="10"/>
    <!-- Neck bridge -->
    <path d="M7.2 10 Q9.2 11.5 11.2 10"/>
    <!-- Handle -->
    <line x1="9.2" y1="11.5" x2="8.5" y2="19"/>

    <!-- Knife (right, tilted ~+20deg) -->
    <!-- Blade -->
    <path d="M22 4.5 C23.5 5 23.5 9 22.5 10.5"/>
    <!-- Handle -->
    <line x1="22.5" y1="10.5" x2="21" y2="19"/>

    <!-- Cross diagonal -->
    <line x1="7" y1="18" x2="24" y2="7"/>
  </g>
</svg>
